<head>

    <link rel="stylesheet" href="./css/login.css">

<body>
    <header class="topo">
        <div class="topo-esquerda">
            <a href="./index.html"><img class="quimex" class="quimex" src="./imagens/quimex-removebg-preview.png"

        <nav class="menu">
